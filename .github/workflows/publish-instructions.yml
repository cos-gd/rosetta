name: Publish Instructions

# This workflow publishes instructions to the Rosetta Server (RAGFlow)
# when changes are pushed to the main branch in instructions/ or plugins/ folders.
#
# Required GitHub Secrets:
#   DEV:  RAGFLOW_API_KEY, RAGFLOW_BASE_URL (optional, falls back to default)
#   OSS:  OSS_RAGFLOW_API_KEY, OSS_RAGFLOW_BASE_URL
#   PROD: PROD_RAGFLOW_API_KEY, PROD_RAGFLOW_BASE_URL

on:
  push:
    branches:
      - main
    paths:
      - 'instructions/**'
      - 'plugins/**'
      - '.github/workflows/publish-instructions.yml'
  workflow_dispatch:
    inputs:
      deploy_to_dev:
        description: 'Publish to DEV Rosetta Server'
        type: boolean
        default: true
        required: false
      deploy_to_oss:
        description: 'Publish to OSS Rosetta Server'
        type: boolean
        default: false
        required: false
      deploy_to_prod:
        description: 'Publish to PROD Rosetta Server'
        type: boolean
        default: false
        required: false
      create_release:
        description: 'Create GitHub Release and archives'
        type: boolean
        default: false
        required: false

permissions:
  contents: write  # Required for creating releases

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Publish to DEV
        if: ${{ github.event_name == 'push' || inputs.deploy_to_dev }}
        uses: ./.github/actions/publish-to-server
        with:
          environment: dev
          api_key: ${{ secrets.RAGFLOW_API_KEY }}
          base_url: ${{ secrets.RAGFLOW_BASE_URL || 'https://ims-dev.evergreen.gcp.griddynamics.net/' }}
          prerelease: 'true'
          version: r2
          dataset_default: aia
          dataset_template: aia-{release}

      - name: Publish to OSS
        if: ${{ inputs.deploy_to_oss }}
        uses: ./.github/actions/publish-to-server
        with:
          environment: oss
          api_key: ${{ secrets.OSS_RAGFLOW_API_KEY }}
          base_url: ${{ secrets.OSS_RAGFLOW_BASE_URL }}
          prerelease: 'false'
          version: r2
          dataset_default: aia
          dataset_template: aia-{release}

      - name: Publish to PROD
        if: ${{ inputs.deploy_to_prod }}
        uses: ./.github/actions/publish-to-server
        with:
          environment: prod
          api_key: ${{ secrets.PROD_RAGFLOW_API_KEY }}
          base_url: ${{ secrets.PROD_RAGFLOW_BASE_URL }}
          prerelease: 'false'
          version: r2
          dataset_default: aia
          dataset_template: aia-{release}

      - name: Create instructions archive
        if: ${{ github.event_name == 'push' || inputs.create_release }}
        run: |
          cd instructions
          zip -r ../instructions.zip . -x "*.git*"
          cd ..
          echo "Archive size: $(du -h instructions.zip | cut -f1)"
          echo "Archive created: instructions.zip"

      - name: Create plugin archives
        id: plugins
        if: ${{ github.event_name == 'push' || inputs.create_release }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          ARCHIVES=""
          # Includes standard plugins and standalone variants (core-cursor-standalone, core-copilot-standalone)
          for plugin_dir in plugins/*/; do
            folder=$(basename "$plugin_dir")
            plugin_json=$(find "$plugin_dir" -name "plugin.json" -maxdepth 3 | head -1)
            if [ -z "$plugin_json" ]; then
              echo "WARNING: No plugin.json found in $plugin_dir, skipping"
              continue
            fi
            version=$(jq -r '.version' "$plugin_json")
            zip_name="${folder}-${version}-${DATE}.zip"
            echo "Creating archive: ${zip_name} (version: ${version})"
            if [[ "$folder" == *-standalone ]]; then
              (cd "$plugin_dir" && zip -r "../../${zip_name}" . -x ".git" -x ".git/*" -x "plugin.json")
            else
              (cd "$plugin_dir" && zip -r "../../${zip_name}" . -x "*.git*")
            fi
            echo "  Size: $(du -h "${zip_name}" | cut -f1)"
            ARCHIVES="${ARCHIVES} ${zip_name}"
          done

          echo "archives=${ARCHIVES}" >> $GITHUB_OUTPUT
          echo "All plugin archives created."

      - name: Create GitHub Release
        id: release
        if: ${{ github.event_name == 'push' || inputs.create_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLUGIN_JSON="${GITHUB_WORKSPACE}/plugins/core-claude/.claude-plugin/plugin.json"
          VERSION=$(jq -r '.version' "$PLUGIN_JSON")
          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Invalid version in ${PLUGIN_JSON}: ${VERSION}"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"

          TAG_MAJOR="v${MAJOR}"
          TAG_MINOR="v${MAJOR}.${MINOR}"
          TAG_PATCH="v${MAJOR}.${MINOR}.${PATCH}"
          DATE=$(date +'%Y%m%d')
          RELEASE_TITLE="${TAG_PATCH} ${DATE}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_major=${TAG_MAJOR}" >> "$GITHUB_OUTPUT"
          echo "tag_minor=${TAG_MINOR}" >> "$GITHUB_OUTPUT"
          echo "tag_patch=${TAG_PATCH}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create or move version tags to the current commit (v2, v2.0, v2.0.55)
          for tag in "$TAG_MAJOR" "$TAG_MINOR" "$TAG_PATCH"; do
            git tag -f "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/${tag}" --force
            echo "Updated tag ${tag} -> ${GITHUB_SHA}"
          done

          gh release create "${TAG_PATCH}" \
            --title "${RELEASE_TITLE}" \
            --generate-notes \
            --latest \
            --target "${GITHUB_SHA}" \
            instructions.zip \
            ${{ steps.plugins.outputs.archives }} \
          || {
            gh release edit "${TAG_PATCH}" \
              --title "${RELEASE_TITLE}" \
              --latest \
              --target "${GITHUB_SHA}"
            gh release upload "${TAG_PATCH}" \
              --clobber \
              instructions.zip \
              ${{ steps.plugins.outputs.archives }}
          }

      - name: Summary
        if: always()
        run: |
          echo "## Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TARGETS=""
          if [ "${{ github.event_name }}" == "push" ] || [ "${{ inputs.deploy_to_dev }}" == "true" ]; then TARGETS="${TARGETS} DEV"; fi
          if [ "${{ inputs.deploy_to_oss }}" == "true" ]; then TARGETS="${TARGETS} OSS"; fi
          if [ "${{ inputs.deploy_to_prod }}" == "true" ]; then TARGETS="${TARGETS} PROD"; fi
          echo "- **Targets:**${TARGETS:-none}" >> $GITHUB_STEP_SUMMARY
          echo "- **Folders:** instructions/, plugins/" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugin Archives:** ${{ steps.plugins.outputs.archives }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.release.outputs.tag_patch }}" ]; then
            echo "- **Version:** ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Tags:** ${{ steps.release.outputs.tag_major }}, ${{ steps.release.outputs.tag_minor }}, ${{ steps.release.outputs.tag_patch }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Release:** ${{ steps.release.outputs.release_title }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Status:** Successfully published" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Publishing failed" >> $GITHUB_STEP_SUMMARY
          fi
