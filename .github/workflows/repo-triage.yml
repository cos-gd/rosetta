name: Rosetta GitHub Triage

# Event-driven workflow triggered by PR and issue activity.
# Reviews PRs and issues, adds labels, posts triage comments,
# creates Jira proxy stories under CTORNDGAIN-1174, and handles
# /rosetta slash commands in comments.
#
# Required GitHub Secrets:
#   - ANTHROPIC_API_KEY
#   - JIRA_API_KEY
#   - CONFLUENCE_API_KEY
#   - JIRA_CONFLUENCE_API_EMAIL

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened]
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: |
      !(github.event_name == 'pull_request_target' && (github.event.pull_request.draft == true || contains(github.event.pull_request.title, 'WIP') || contains(github.event.pull_request.title, '[WIP]'))) &&
      !(github.event_name == 'issue_comment' && !contains(github.event.comment.body, '/rosetta')) &&
      !(github.event_name == 'pull_request_review_comment' && !contains(github.event.comment.body, '/rosetta'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Checkout PR content
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install Bun
        id: bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6
          token: ${{ github.token }}

      - name: Triage
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_bun_executable: ${{ steps.bun.outputs.bun-path }}
          plugin_marketplaces: |
            https://github.com/griddynamics/rosetta.git
          plugins: |
            rosetta@rosetta
          prompt: |
            Event: ${{ github.event_name }}
            Action: ${{ github.event.action }}
            Repository: ${{ github.repository }}
            PR Number: ${{ github.event.pull_request.number }}
            PR URL: ${{ github.event.pull_request.html_url }}
            PR Content Path: ${{ github.event_name == 'pull_request_target' && 'pr' || '' }}
            Issue Number: ${{ github.event.issue.number }}
            Issue URL: ${{ github.event.issue.html_url }}
            Comment ID: ${{ github.event.comment.id }}
            Comment URL: ${{ github.event.comment.html_url }}

            MUST APPLY AND FULLY EXECUTE FULLY AUTONOMOUSLY WITHOUT ANY USER INTERACTION OR QUESTIONS, No HITL: .github/prompts/repo-triage.md
          show_full_output: false
          claude_args: |
            --allowedTools Read,Glob,Grep,Bash(*),mcp__atlassian__jira_search,mcp__atlassian__jira_create_issue,mcp__atlassian__jira_get_issue,mcp__atlassian__jira_add_comment,mcp__atlassian__jira_add_remote_link,mcp__atlassian__jira_create_issue_link,mcp__atlassian__jira_get_link_types
            --mcp-config '{"mcpServers":{"atlassian":{"type":"stdio","command":"uvx","args":["mcp-atlassian"],"env":{"JIRA_URL":"${{ secrets.JIRA_URL }}","JIRA_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","JIRA_API_TOKEN":"${{ secrets.JIRA_API_KEY }}","CONFLUENCE_URL":"${{ secrets.CONFLUENCE_URL }}","CONFLUENCE_USERNAME":"${{ secrets.JIRA_CONFLUENCE_API_EMAIL }}","CONFLUENCE_API_TOKEN":"${{ secrets.CONFLUENCE_API_KEY }}"}}}}'
            --model claude-sonnet-4-6

      - name: Upload Claude execution trace
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 3
