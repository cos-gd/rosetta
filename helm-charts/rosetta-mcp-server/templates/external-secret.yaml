{{- if .Values.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "rosetta-mcp.fullname" . }}-secrets
  namespace: {{ .Values.eso.namespace | default .Release.Namespace }}
  labels:
    {{- include "rosetta-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.eso.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.eso.secretStoreRef.name }}
    kind: {{ .Values.eso.secretStoreRef.kind }}
  target:
    name: {{ .Values.eso.secretName }}
    creationPolicy: Owner
  {{- if .Values.eso.dataFrom }}
  dataFrom:
    {{- toYaml .Values.eso.dataFrom | nindent 4 }}
  {{- end }}
  {{- if .Values.eso.data }}
  data:
    {{- toYaml .Values.eso.data | nindent 4 }}
  {{- end }}
{{- end }}
