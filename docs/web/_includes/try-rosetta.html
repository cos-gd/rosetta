<!-- ===== TRY ROSETTA DRAWER ===== -->
<button class="try-rosetta-fab" id="try-fab" aria-label="Try Rosetta demo">Try Rosetta</button>
<div class="try-drawer-overlay" id="try-overlay"></div>
<div class="try-drawer" id="try-drawer" role="dialog" aria-modal="true" aria-label="Try Rosetta demo">
  <div class="try-drawer-header">
    <div>
      <div class="try-drawer-title">Try Rosetta</div>
      <div class="try-drawer-subtitle">See how Rosetta handles real tasks</div>
    </div>
    <button class="try-drawer-close" id="try-close" aria-label="Close">&times;</button>
  </div>
  <div class="try-drawer-body">
    <div class="try-scenarios" id="try-scenarios"></div>
    <div class="try-chat" id="try-chat"></div>
  </div>
</div>

<script>
(function(){
  var scenarios = [
    // ── WORKFLOWS ──
    {
      title: 'What can Rosetta help with?',
      tag: 'Self Help',
      paid: false,
      messages: [
        { role: 'user', text: 'What workflows are available? I need to set up a new project.' },
        { role: 'rosetta', text: '<strong>Mode: self-help</strong> — Listing capabilities from knowledge base...' },
        { role: 'rosetta', text: '<strong>Workflows:</strong> Init, Self Help, Coding, Requirements, Ad-hoc, Research, Code Analysis, Automated QA, Test Case Generation, Modernization, External Library, Coding Agents Prompting.<br><br>Describe what you need — Rosetta classifies and routes automatically.' },
        { role: 'rosetta', text: '<strong>Guide:</strong> You asked about setting up a project. That maps to <strong>Init</strong>. It generates TECHSTACK.md, CODEMAP.md, CONTEXT.md, ARCHITECTURE.md, patterns, and IDE shells in 8 phases.<br><br>Ready to start?' },
        { role: 'rosetta', text: '<strong>Handoff:</strong> Launching Init workflow now...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Set up a new project',
      tag: 'Init',
      paid: false,
      messages: [
        { role: 'user', text: 'Initialize Rosetta for our notification microservice.' },
        { role: 'rosetta', text: '<strong>Mode: init</strong> — Context: Detected existing repo. Building file inventory...' },
        { role: 'rosetta', text: '<strong>Shells:</strong> Generated IDE shell files for Claude Code, Cursor, Copilot, Windsurf.<br><strong>Discovery:</strong> Produced <code>TECHSTACK.md</code> (Go 1.22, gRPC, PostgreSQL), <code>CODEMAP.md</code>, <code>DEPENDENCIES.md</code>.' },
        { role: 'rosetta', text: '<strong>Patterns:</strong> Extracted 8 recurring coding and architectural patterns.<br><strong>Documentation:</strong> Created <code>CONTEXT.md</code>, <code>ARCHITECTURE.md</code>, <code>IMPLEMENTATION.md</code>, <code>ASSUMPTIONS.md</code>.' },
        { role: 'rosetta', text: '<strong>Questions:</strong> Reviewed all generated docs for gaps — asking you to clarify 3 points: deployment target, auth strategy, retry policy.<br><br>Waiting for your answers.' },
        { role: 'rosetta', text: '<strong>Verification:</strong> All artifacts validated against your codebase. Catch-up complete. <em>Start a new session to use Rosetta with full project context.</em>' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Define requirements for a feature',
      tag: 'Requirements',
      paid: false,
      messages: [
        { role: 'user', text: 'Write requirements for email notification preferences.' },
        { role: 'rosetta', text: '<strong>Mode: requirements</strong> — Discovery: Found notification module in <code>ARCHITECTURE.md</code>. 3 related stories and existing constraints identified.' },
        { role: 'rosetta', text: '<strong>Research:</strong> Located your team\'s Given/When/Then format and prior requirements decisions from knowledge base.' },
        { role: 'rosetta', text: '<strong>Intent capture:</strong> Restating your intent, scope, goals, and surfacing assumptions.<br><br>Waiting for your confirmation before proceeding.' },
        { role: 'rosetta', text: '<strong>Outline:</strong> MECE requirement layout proposed across functional, NFR, and constraint areas.<br><br>Waiting for your approval.' },
        { role: 'rosetta', text: '<strong>Draft:</strong> Atomic requirement units authored in EARS notation. Per-requirement approval pass complete.' },
        { role: 'rosetta', text: '<strong>Validate:</strong> Reviewer checked for conflicts, gaps, and contradictions. All clear.' },
        { role: 'rosetta', text: '<strong>Deliver:</strong> Final set, traceability matrix, and change log saved to <code>docs/REQUIREMENTS/notification-preferences.md</code>.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Add a new feature',
      tag: 'Coding',
      paid: false,
      messages: [
        { role: 'user', text: 'Add password reset functionality to our auth module.' },
        { role: 'rosetta', text: '<strong>Mode: coding</strong> — Classified as MEDIUM — full subagent pipeline.' },
        { role: 'rosetta', text: '<strong>Discovery:</strong> <em>(discoverer)</em> Analyzed auth module at <code>src/auth/</code> — JWT + bcrypt, 4 existing endpoints. Saved discovery notes.' },
        { role: 'rosetta', text: '<strong>Tech plan:</strong> <em>(architect)</em> Produced <code>password-reset-SPECS.md</code> and <code>password-reset-PLAN.md</code>:<br>1. <code>POST /auth/forgot-password</code><br>2. <code>POST /auth/reset-password</code><br>3. Token store with 15-min expiry<br>4. SendGrid email template<br>5. Rate limiting (3 req/min)' },
        { role: 'rosetta', text: '<strong>Review plan:</strong> <em>(reviewer)</em> Plan reviewed against project conventions. No issues found.' },
        { role: 'rosetta', text: '<strong>Approve plan:</strong> Waiting for your approval before implementation.' },
        { role: 'rosetta', text: '<strong>Implementation:</strong> <em>(engineer)</em> Code implemented per specs. Build passes.' },
        { role: 'rosetta', text: '<strong>Review code + Impl validation:</strong> <em>(reviewer + validator)</em> Code reviewed against specs. Validation passed.<br><br><strong>Approve implementation:</strong> Waiting for your review.' },
        { role: 'rosetta', text: '<strong>Tests:</strong> <em>(engineer)</em> Test suite written and passing. <em>(reviewer)</em> Coverage verified. Final validation complete.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Ad-hoc task — rename across project',
      tag: 'Ad-hoc',
      paid: false,
      messages: [
        { role: 'user', text: 'Rename userList to activeUsers across the project.' },
        { role: 'rosetta', text: '<strong>Mode: ad-hoc</strong> — Classified as SMALL. Selecting building blocks: execute, review...' },
        { role: 'rosetta', text: '<strong>Build plan:</strong> Loaded coding conventions — camelCase naming, no abbreviations. Found 12 occurrences of <code>userList</code> across 5 files.' },
        { role: 'rosetta', text: '<strong>Execute plan:</strong> Renamed all 12 occurrences to <code>activeUsers</code>. Updated imports and references. No tests broken.' },
        { role: 'rosetta', text: '<strong>Review and summarize:</strong> Result verified against original intent. All references updated, build clean.' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Research architecture options',
      tag: 'Research',
      paid: false,
      messages: [
        { role: 'user', text: 'Research options for migrating our queue from RabbitMQ to something more scalable.' },
        { role: 'rosetta', text: '<strong>Mode: research...</strong>' },
        { role: 'rosetta', text: '<strong>Prompt craft:</strong> Architect built an optimized research prompt targeting your stack constraints and scaling requirements.<br><br>Waiting for your approval before running the investigation.' },
        { role: 'rosetta', text: '<strong>Execute research:</strong> Dedicated subagent investigated Kafka, NATS JetStream, and AWS SQS/SNS against your constraints — throughput, ops complexity, migration effort, cost.' },
        { role: 'rosetta', text: '<strong>Finalize:</strong> Comparative analysis with decision matrix and recommended approach saved to <code>docs/research/mq-migration.md</code>.' },
        { role: 'cta', text: '' }
      ]
    },
    // ── ADVANCED WORKFLOWS ──
    {
      title: 'Analyze codebase and trace flows',
      tag: 'Code Analysis',
      paid: false,
      messages: [
        { role: 'user', text: 'Explain how payment processing works end-to-end.' },
        { role: 'rosetta', text: 'Launching code-analysis...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Generate QA test suite',
      tag: 'Automated QA',
      paid: false,
      messages: [
        { role: 'user', text: 'Create QA automation for the checkout flow.' },
        { role: 'rosetta', text: 'Launching aqa...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Generate test cases from Jira',
      tag: 'Test Case Gen',
      paid: false,
      messages: [
        { role: 'user', text: 'Generate test cases for PROJ-123.' },
        { role: 'rosetta', text: 'Launching test-case-gen...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Modernize legacy codebase',
      tag: 'Modernization',
      paid: false,
      messages: [
        { role: 'user', text: 'Migrate our billing module from monolith to microservice.' },
        { role: 'rosetta', text: 'Launching modernization...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Onboard an internal library',
      tag: 'External Library',
      paid: false,
      messages: [
        { role: 'user', text: 'Teach Rosetta our internal authentication library.' },
        { role: 'rosetta', text: 'Launching external-lib...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    },
    {
      title: 'Author a prompt for your AI agent',
      tag: 'Agents Prompting',
      paid: false,
      messages: [
        { role: 'user', text: 'Author a code review skill for our internal AI agent.' },
        { role: 'rosetta', text: 'Launching coding-agents-prompting...' },
        { role: 'rosetta', text: '...' },
        { role: 'cta', text: '' }
      ]
    }
  ];

  /* Expose scenarios globally */
  window.__tryRosettaScenarios = scenarios;

  /* Trigger event for inline section that may already be waiting */
  document.dispatchEvent(new CustomEvent('tryRosettaReady'));

  var fab = document.getElementById('try-fab');
  var overlay = document.getElementById('try-overlay');
  var drawer = document.getElementById('try-drawer');
  var closeBtn = document.getElementById('try-close');
  var scenariosEl = document.getElementById('try-scenarios');
  var chatEl = document.getElementById('try-chat');

  function openDrawer() {
    drawer.classList.add('is-open');
    overlay.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    drawer.classList.remove('is-open');
    overlay.classList.remove('is-open');
    document.body.style.overflow = '';
    setTimeout(function() { showScenarios(); }, 350);
  }

  function showScenarios() {
    chatEl.classList.remove('is-active');
    scenariosEl.style.display = '';
    scenariosEl.innerHTML = '';

    var label = document.createElement('div');
    label.className = 'try-section-label';
    label.textContent = 'Workflows';
    scenariosEl.appendChild(label);

    scenarios.forEach(function(s) {
      var idx = scenarios.indexOf(s);
      var card = document.createElement('div');
      card.className = 'try-scenario-card';
      card.innerHTML = '<div class="try-scenario-tag">' + s.tag + '</div><div class="try-scenario-title">' + s.title + '</div>';
      card.addEventListener('click', function() { playScenario(idx); });
      scenariosEl.appendChild(card);
    });
  }

  var drawerSession = 0;

  function playScenario(idx) {
    var s = scenarios[idx];
    var session = ++drawerSession;
    scenariosEl.style.display = 'none';
    chatEl.innerHTML = '';
    chatEl.classList.add('is-active');

    var backBtn = document.createElement('button');
    backBtn.className = 'try-chat-back';
    backBtn.textContent = '\u2190 Back to scenarios';
    backBtn.addEventListener('click', showScenarios);
    chatEl.appendChild(backBtn);

    var proTeaserLimit = 2;

    var delay = 0;
    s.messages.forEach(function(msg, mi) {
      if (s.paid && msg.role === 'cta') return;

      delay += mi === 0 ? 300 : 1200;

      if (s.paid && mi === proTeaserLimit) {
        setTimeout(function() {
          if (session !== drawerSession) return;
          var typing = chatEl.querySelector('.try-typing');
          if (typing) typing.remove();

          var blurWrap = document.createElement('div');
          blurWrap.className = 'try-pro-blur-wrap';

          for (var bi = proTeaserLimit; bi < s.messages.length; bi++) {
            if (s.messages[bi].role === 'cta') continue;
            var blurMsg = document.createElement('div');
            blurMsg.className = 'try-msg try-msg--' + s.messages[bi].role + ' try-msg--blurred';
            blurMsg.innerHTML = s.messages[bi].text;
            blurWrap.appendChild(blurMsg);
          }

          var unlock = document.createElement('div');
          unlock.className = 'try-pro-unlock';
          unlock.innerHTML = '<div class="try-pro-unlock-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 118 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>' +
            '<h4>Unlock full workflow</h4>' +
            '<p>See how Rosetta handles this end-to-end with your codebase context.</p>' +
            '<a href="mailto:rosetta-support@griddynamics.com" class="try-pro-unlock-btn">Contact Us</a>';
          blurWrap.appendChild(unlock);

          chatEl.appendChild(blurWrap);
          chatEl.scrollTop = chatEl.scrollHeight;
        }, delay);
        return;
      }

      if (s.paid && mi > proTeaserLimit) return;

      setTimeout(function() {
        if (session !== drawerSession) return;
        var typing = chatEl.querySelector('.try-typing');
        if (typing) typing.remove();

        var el = document.createElement('div');
        if (msg.role === 'cta') {
          el.className = 'try-msg try-msg--cta';
          el.innerHTML = '<a href="{{ "/" | relative_url }}#try-rosetta-section">Ready to try it yourself? Get Started</a>';
          el.querySelector('a').addEventListener('click', function() { closeDrawer(); });
        } else {
          el.className = 'try-msg try-msg--' + msg.role;
          el.innerHTML = msg.text;
        }
        chatEl.appendChild(el);
        chatEl.scrollTop = chatEl.scrollHeight;

        var nextIdx = mi + 1;
        var showTyping = false;
        if (!s.paid && nextIdx < s.messages.length && s.messages[nextIdx].role !== 'cta') {
          showTyping = true;
        } else if (s.paid && nextIdx < proTeaserLimit && nextIdx < s.messages.length) {
          showTyping = true;
        } else if (s.paid && nextIdx === proTeaserLimit) {
          showTyping = true;
        }
        if (showTyping) {
          setTimeout(function() {
            if (session !== drawerSession) return;
            var dots = document.createElement('div');
            dots.className = 'try-typing';
            dots.innerHTML = '<span></span><span></span><span></span>';
            chatEl.appendChild(dots);
            chatEl.scrollTop = chatEl.scrollHeight;
          }, 400);
        }
      }, delay);
    });
  }

  showScenarios();
  fab.addEventListener('click', openDrawer);
  overlay.addEventListener('click', closeDrawer);
  closeBtn.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && drawer.classList.contains('is-open')) closeDrawer();
  });
})();
</script>
