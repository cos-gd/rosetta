<header class="site-header">
  <div class="nav-wrap">
    <div class="brand">
      <img src="{{ '/assets/brand/rosetta-logo-full-color-white.png' | relative_url }}" alt="Rosetta" class="brand-logo logo-dark">
      <img src="{{ '/assets/brand/rosetta-logo-full-color.png' | relative_url }}" alt="Rosetta" class="brand-logo logo-light">
    </div>
    <nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <ul>
        <li><a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a></li>
        <li><a href="{{ '/overview/' | relative_url }}" class="{% if page.url == '/overview/' %}active{% endif %}">Overview</a></li>
        <li><a href="{{ '/contribute/' | relative_url }}" class="{% if page.url == '/contribute/' %}active{% endif %}">Contribute</a></li>
        <li><a href="{{ '/docs/introduction/' | relative_url }}" class="{% if page.url contains '/docs/' %}active{% endif %}">Docs</a></li>
        <li><a href="{{ '/roadmap/' | relative_url }}" class="{% if page.url == '/roadmap/' %}active{% endif %}">Roadmap</a></li>
        <li>
          <a href="https://github.com/griddynamics/rosetta" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="GitHub repository griddynamics/rosetta">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.57 7.57 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
            <span>griddynamics/rosetta</span>
          </a>
        </li>
        <li>
          <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme" title="Switch theme">☀</button>
        </li>
      </ul>
    </nav>
  </div>
</header>
<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  function updateIcon() {
    var theme = document.documentElement.getAttribute('data-theme');
    btn.textContent = theme === 'dark' ? '☀' : '☾';
    btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  }
  updateIcon();
  btn.addEventListener('click', function(){
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('rosetta-theme', next);
    updateIcon();
  });
  // Mobile nav toggle
  var navToggle = document.getElementById('nav-toggle');
  var navList = navToggle.nextElementSibling;
  navToggle.addEventListener('click', function(){
    var open = navList.classList.toggle('is-open');
    navToggle.setAttribute('aria-expanded', open);
    navToggle.textContent = open ? '\u2715' : '\u2630';
  });
})();
</script>
